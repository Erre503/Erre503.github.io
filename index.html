<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erre503 - Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">
            <div class="terminal-buttons">
                <span class="terminal-button close"></span>
                <span class="terminal-button minimize"></span>
                <span class="terminal-button maximize"></span>
            </div>
            <div class="terminal-title">erre503@github ~ Terminal</div>
        </div>
        <div class="terminal-body">
            <div id="terminal-output">
                <div class="terminal-line">
                    <span class="terminal-prompt">erre503@github:~$</span>
                    <span class="terminal-text">Welcome to Erre503's GitHub Terminal</span>
                </div>
                <div class="terminal-line">
                    <span class="terminal-prompt">erre503@github:~$</span>
                    <span class="terminal-text">Type 'help' to see available commands</span>
                </div>
                <div class="terminal-line">
                    <span class="terminal-prompt">erre503@github:~$</span>
                    <span class="terminal-text">Use 'cat github_stats.txt' or 'cat github_detailed.txt' to view GitHub statistics</span>
                </div>
            </div>
            <div class="terminal-input-line">
                <span class="terminal-prompt">erre503@github:~$</span>
                <input type="text" id="terminal-input" autocomplete="off" spellcheck="false">
                <span class="cursor">█</span>
            </div>
        </div>
    </div>

    <script src="funct.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const terminalInput = document.getElementById('terminal-input');
            const terminalOutput = document.getElementById('terminal-output');
            const terminalSimulator = new window.TerminalSimulator();
            let commandHistory = [];
            let historyIndex = -1;

            // Initialize terminal
            setTimeout(() => {
                terminalInput.focus();
            }, 100);

            // Handle input
            terminalInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const command = this.value.trim();
                    if (command) {
                        commandHistory.push(command);
                        historyIndex = commandHistory.length;

                        // Add command to output
                        addToOutput(`erre503@github:~$ ${command}`);

                        // Execute command
                        const result = terminalSimulator.executeCommand(command);

                        if (result === 'CLEAR_TERMINAL') {
                            clearTerminal();
                        } else if (result) {
                            // Split result by newlines and add each line
                            const lines = result.split('\n');
                            lines.forEach(line => {
                                if (line.trim()) {
                                    addToOutput(line);
                                }
                            });
                        }

                        // Clear input
                        this.value = '';

                        // Scroll to bottom
                        terminalOutput.scrollTop = terminalOutput.scrollHeight;
                    }
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (historyIndex > 0) {
                        historyIndex--;
                        this.value = commandHistory[historyIndex];
                    }
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (historyIndex < commandHistory.length - 1) {
                        historyIndex++;
                        this.value = commandHistory[historyIndex];
                    } else {
                        historyIndex = commandHistory.length;
                        this.value = '';
                    }
                }
            });

            function addToOutput(text) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'terminal-line';

                if (text.startsWith('erre503@github:~$')) {
                    const promptSpan = document.createElement('span');
                    promptSpan.className = 'terminal-prompt';
                    promptSpan.textContent = 'erre503@github:~$';

                    const textSpan = document.createElement('span');
                    textSpan.className = 'terminal-text';
                    textSpan.textContent = text.substring(17);

                    lineDiv.appendChild(promptSpan);
                    lineDiv.appendChild(textSpan);
                } else {
                    const textSpan = document.createElement('span');
                    textSpan.className = 'terminal-text';
                    textSpan.textContent = text;
                    lineDiv.appendChild(textSpan);
                }

                terminalOutput.appendChild(lineDiv);
            }

            function clearTerminal() {
                // Keep only the welcome messages
                const welcomeLines = [
                    'Welcome to Erre503\'s GitHub Terminal',
                    'Type \'help\' to see available commands',
                    'Use \'cat github_stats.txt\' or \'cat github_detailed.txt\' to view GitHub statistics'
                ];

                terminalOutput.innerHTML = '';
                welcomeLines.forEach(line => {
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'terminal-line';

                    const promptSpan = document.createElement('span');
                    promptSpan.className = 'terminal-prompt';
                    promptSpan.textContent = 'erre503@github:~$';

                    const textSpan = document.createElement('span');
                    textSpan.className = 'terminal-text';
                    textSpan.textContent = line;

                    lineDiv.appendChild(promptSpan);
                    lineDiv.appendChild(textSpan);
                    terminalOutput.appendChild(lineDiv);
                });
            }

            // Auto-focus on click
            document.addEventListener('click', function() {
                terminalInput.focus();
            });

            // Blinking cursor effect
            setInterval(() => {
                const cursor = document.querySelector('.cursor');
                cursor.style.opacity = cursor.style.opacity === '0' ? '1' : '0';
            }, 500);
        });
    </script>
</body>
</html>
